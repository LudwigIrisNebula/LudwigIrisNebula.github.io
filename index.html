<!DOCTYPE html>
<html>

  <head>
    <title>Caelan's WebOS</title>

    <style></style>
    
  </head>

  <body style="background-color: rgb(203, 203, 203); 
    font-family: Helvetica, Noto Sans, sans-serif">

    <!-- Time -->
    <script>
      function updateTime() {
        var currentTime = new Date().toLocaleString();
        var timeText = document.querySelector("#timeElement");
        timeText.innerHTML = currentTime;
      }
      setInterval(updateTime, 1000);
    </script>

    <!-- Center -->
    <div style="border: thick double #ffffff; width: 192px; border-radius: 16px; padding: 16px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%)">
      <h1 
        style="margin: 4px; 
        color: #fff">
        Greetings!
      </h1>

      <p 
        style="color: #5cb7a6;">
        Welcome to my GitHub Pages site!
      </p>

      <img 
        style="object-fit: cover; 
        width: 128px; height: 128px; object-fit: cover" 
        src="picture/crow.one.png">

    </div>

    <!-- Top -->
    <div style="display: flex; position: absolute; width: 100%; display: flex; justify-content: space-around; backdrop-filter: blur(10px); background-color: rgb(0, 75, 46); color: #fff;">
      <p style="margin-left: 16px;">
        CealanOS
      </p> 
      <p style="margin-right: 16px;">
        2/24/2026 0:01 | 2/24/2019
      </p>
    </div>

    <div>
      <p>Hello, I'm Cealan(or Ludwig, it's all my fake name anyway)</p>
      <img src="picture/Sea, People.jpg">
    </div>

    <div>
      <p>did you know...</p>
      <!-- put something random and strange -->

      <p>you are lost</p>
      <!-- put it when viewer pass one hour in here -->

      <p id="timeElement"
      style="margin-right: 16px;">
      Time
      </p>
    </div>


  </body>

</html>
